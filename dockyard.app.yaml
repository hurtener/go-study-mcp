# Dockyard manifest — the control plane for this MCP server (RFC §4.2).
name: go-study-mcp
title: Go Study MCP
version: 0.4.2

runtime:
  transports: [stdio]

apps:
  - id: studio
    uri: ui://go-study-mcp/studio/index.html
    entry: web/src/App.svelte
    display_modes: [inline]
    csp:
      connect: []
      resource: []
    visibility: [model, app]

tools:
  - name: generate_podcast
    description: Transform study material into a narrated podcast-style audio with flexible tone, persona, and language support.
    input: internal/contracts.GeneratePodcastInput
    output: internal/contracts.GeneratePodcastOutput
    ui: studio
    task_support: forbidden

  - name: generate_flashcards
    description: Generate Q&A flashcard audio from study material with timed pauses for active recall.
    input: internal/contracts.GenerateFlashcardsInput
    output: internal/contracts.GenerateFlashcardsOutput
    ui: studio
    task_support: forbidden

  - name: synthesize_speech
    description: Direct text-to-speech synthesis with support for [PAUSE:N] markers.
    input: internal/contracts.SynthesizeSpeechInput
    output: internal/contracts.SynthesizeSpeechOutput
    ui: studio
    task_support: forbidden

  - name: generate_study_guide
    description: Generate a deep, expert-level narrated study guide with expressive audio tags for multi-tonal TTS.
    input: internal/contracts.GenerateStudyGuideInput
    output: internal/contracts.GenerateStudyGuideOutput
    ui: studio
    task_support: forbidden

  - name: list_jobs
    description: List all audio generation jobs and their status. The UI polls this to render the Jobs tab.
    input: internal/contracts.ListJobsInput
    output: internal/contracts.ListJobsOutput
    task_support: forbidden

  - name: read_audio
    description: Return a generated audio file as a data URI for inline playback. Reads are confined to the server output directory.
    input: internal/contracts.ReadAudioInput
    output: internal/contracts.ReadAudioOutput
    task_support: forbidden

  - name: list_voices
    description: List the TTS voices available for the active provider, with the default. The UI populates its voice picker from this.
    input: internal/contracts.ListVoicesInput
    output: internal/contracts.ListVoicesOutput
    task_support: forbidden

quality:
  require_loading_state: true
  require_empty_state: true
  require_error_state: true
  require_permission_state: true
  require_fixtures: true
  require_contract_tests: true
  require_spec_compliance: true
